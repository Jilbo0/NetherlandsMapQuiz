<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaatsen — Dutch places quiz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <style>
    :root {
      --paper: #F3EEE2;
      --paper-deep: #E8E0CC;
      --ink: #2B3A4A;
      --ink-soft: #5C6B78;
      --line: #C9BFA4;
      --accent: #C1572D;
      --accent-deep: #99431F;
      --good: #4C7A52;
      --font-display: 'Georgia', 'Times New Roman', serif;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      background-image:
              radial-gradient(circle at 20% 30%, rgba(43,58,74,0.03) 0, transparent 45%),
              radial-gradient(circle at 80% 70%, rgba(43,58,74,0.03) 0, transparent 45%);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 14px;
      margin-bottom: 22px;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0;
    }

    header h1 .sub {
      display: block;
      font-family: var(--font-body);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--ink-soft);
      font-weight: 600;
      margin-top: 2px;
    }

    .mode-switch {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--ink);
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-switch button {
      border: none;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-switch button + button {
      border-left: 1.5px solid var(--ink);
    }

    .mode-switch button.active {
      background: var(--ink);
      color: var(--paper);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    .map-card {
      border: 1.5px solid var(--ink);
      border-radius: 10px;
      overflow: hidden;
      background: #CFE0DC;
      position: relative;
    }

    #map {
      height: 620px;
      width: 100%;
      background: #CFE0DC;
    }

    .leaflet-container {
      font-family: var(--font-body);
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-card {
      border: 1.5px solid var(--ink);
      border-radius: 10px;
      background: var(--paper-deep);
      padding: 18px 20px;
    }

    .panel-card .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--ink-soft);
      font-weight: 700;
      margin: 0 0 8px;
    }

    .prompt-name {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      margin: 0;
      line-height: 1.25;
    }

    .prompt-province {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .name-input-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .name-input-row input {
      flex: 1;
      font-size: 16px;
      padding: 10px 12px;
      border: 1.5px solid var(--ink);
      border-radius: 6px;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
    }

    .name-input-row input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    button.primary {
      border: 1.5px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: opacity 0.15s;
    }

    button.primary:hover { opacity: 0.85; }
    button.primary:disabled { opacity: 0.4; cursor: default; }

    .feedback {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .feedback.show { display: block; }

    .feedback.correct {
      background: rgba(76,122,82,0.12);
      border: 1px solid var(--good);
      color: #2E4F32;
    }

    .feedback.close {
      background: rgba(193,87,45,0.10);
      border: 1px solid var(--accent);
      color: var(--accent-deep);
    }

    .feedback.wrong {
      background: rgba(43,58,74,0.06);
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 4px;
    }

    .score-row .big {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }

    .score-row .label {
      font-size: 12px;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .stats strong {
      color: var(--ink);
      font-size: 16px;
      display: block;
      font-family: var(--font-display);
    }

    .next-row {
      margin-top: 14px;
    }

    .hint {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 10px;
      line-height: 1.5;
    }

    #status-banner {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(193,87,45,0.1);
      border: 1px solid var(--accent);
      color: var(--accent-deep);
      margin-bottom: 14px;
      display: none;
    }

    #status-banner.show { display: block; }

    /* Province mode: label that follows the cursor while it's over the map,
       Seterra-style — shows the place name the user needs to locate. */
    #cursor-label {
      position: absolute;
      pointer-events: none;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      padding: 5px 11px;
      border-radius: 5px;
      white-space: nowrap;
      z-index: 1000;
      display: none;
      transform: translate(14px, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .province-feedback-banner {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    .province-feedback-banner.show { display: block; }

    .province-feedback-banner.correct {
      background: rgba(76,122,82,0.12);
      border: 1px solid var(--good);
      color: #2E4F32;
    }

    .province-feedback-banner.wrong {
      background: rgba(193,87,45,0.10);
      border: 1px solid var(--accent);
      color: var(--accent-deep);
    }

    .province-feedback-banner.reveal {
      background: rgba(43,58,74,0.07);
      border: 1px solid var(--line);
      color: var(--ink);
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Plaatsen<span class="sub">Dutch places trainer</span></h1>
    <div class="mode-switch">
      <button id="mode-click" class="active">Click the map</button>
      <button id="mode-name">Name the place</button>
      <button id="mode-province">Province practice</button>
    </div>
  </header>

  <div id="status-banner"></div>

  <div class="layout">
    <div class="map-card">
      <div id="map"></div>
      <div id="cursor-label"></div>
    </div>

    <div class="side-panel">
      <div class="panel-card" id="prompt-card">
        <p class="eyebrow" id="prompt-eyebrow">Find this place</p>
        <p class="prompt-name" id="prompt-name">Loading…</p>
        <p class="prompt-province" id="prompt-province"></p>

        <!-- Name mode input (hidden in click mode) -->
        <div class="name-input-row" id="name-input-row" style="display:none">
          <input type="text" id="name-input" placeholder="Type the place name…" autocomplete="off" />
          <button class="primary" id="submit-name">Check</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="province-feedback-banner" id="province-feedback"></div>

        <div class="next-row">
          <button class="primary" id="next-btn" style="display:none">Next place →</button>
          <button class="primary" id="province-next-btn" style="display:none">Next place →</button>
        </div>

        <p class="hint" id="hint-text">Click anywhere on the map where you think this place is.</p>
      </div>

      <div class="panel-card" id="stats-card">
        <p class="eyebrow">This session</p>
        <div class="stats">
          <div>
            <strong id="stat-rounds">0</strong>
            rounds played
          </div>
          <div>
            <strong id="stat-score">0</strong>
            total score
          </div>
          <div>
            <strong id="stat-avg">—</strong>
            avg score
          </div>
        </div>
      </div>

      <div class="panel-card" id="province-stats-card" style="display:none">
        <p class="eyebrow">Province practice</p>
        <div class="stats">
          <div>
            <strong id="province-stat-correct">0</strong>
            correct
          </div>
          <div>
            <strong id="province-stat-firsttry">0</strong>
            first-try
          </div>
          <div>
            <strong id="province-stat-rounds">0</strong>
            rounds
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

  // ---- Map setup (no tile layer — plain flat-colored shape, Seterra-style) ----
  const map = L.map('map', {
    center: [52.2, 5.4],
    zoom: 8,
    minZoom: 7,
    maxZoom: 12,
    maxBounds: [[50.0, 2.5], [54.5, 8.0]],
    zoomControl: true,
    attributionControl: false
  });

  L.geoJSON(NL_OUTLINE, {
    style: {
      fillColor: '#6B9E73',
      fillOpacity: 1,
      color: '#3F5C45',
      weight: 1.5
    }
  }).addTo(map);

  // Province borders + interactive polygons. Always drawn (for the visible
  // dividing lines in every mode), but hover/click *behavior* only does anything
  // in province mode — see the mouseover/mouseout/click handlers below, which all
  // check `mode === 'province'` before reacting.
  const PROVINCE_DEFAULT_STYLE = {
    fillOpacity: 0,
    color: '#3F5C45',
    weight: 1,
    opacity: 0.55,
    dashArray: '3 3'
  };
  const PROVINCE_HOVER_STYLE = {
    fillOpacity: 0.18,
    fillColor: '#F3EEE2',
    color: '#3F5C45',
    weight: 1.5,
    opacity: 0.8,
    dashArray: '3 3'
  };
  const PROVINCE_WRONG_STYLE = {
    fillOpacity: 0.35,
    fillColor: '#C1572D',
    color: '#99431F',
    weight: 1.5,
    opacity: 0.9,
    dashArray: '3 3'
  };
  const PROVINCE_CORRECT_STYLE = {
    fillOpacity: 0.45,
    fillColor: '#4C7A52',
    color: '#2E4F32',
    weight: 1.5,
    opacity: 0.9,
    dashArray: '3 3'
  };
  const PROVINCE_REVEAL_STYLE = {
    fillOpacity: 0.45,
    fillColor: '#4C7A52',
    color: '#2E4F32',
    weight: 2,
    opacity: 1,
    dashArray: null
  };

  L.geoJSON(NL_PROVINCES, {
    style: PROVINCE_DEFAULT_STYLE,
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name;
      provinceLayers[name] = layer;

      // The "resting" (non-hover) style for this province right now — depends on
      // whether it was guessed wrong this round, or is the just-revealed answer.
      // Used to restore the correct look on mouseout, instead of always falling
      // back to the plain default (which was wiping out the green reveal highlight).
      function restingStyleFor(provinceName) {
        if (provinceRevealed && provinceName === provinceRevealedCorrectName) return PROVINCE_REVEAL_STYLE;
        if (provinceWrongNames.has(provinceName)) return PROVINCE_WRONG_STYLE;
        return PROVINCE_DEFAULT_STYLE;
      }

      layer.on('mouseover', () => {
        if (mode !== 'province' || !roundActive) return;
        // Don't show a hover highlight over a province whose resting state is already
        // meaningful (wrong-this-round, or the revealed answer) — that state should win.
        if (provinceWrongNames.has(name)) return;
        if (provinceRevealed && name === provinceRevealedCorrectName) return;
        layer.setStyle(PROVINCE_HOVER_STYLE);
      });

      layer.on('mouseout', () => {
        if (mode !== 'province') return;
        layer.setStyle(restingStyleFor(name));
      });

      layer.on('click', (e) => {
        if (mode !== 'province' || !roundActive) return;
        // Stop this click from also reaching the underlying map click handler
        // (which drives "click the map" mode's city-guessing) — province mode
        // owns clicks exclusively while active.
        L.DomEvent.stopPropagation(e);
        handleProvinceClick(name);
      });
    }
  }).addTo(map);

  function showStatus(msg) {
    const el = document.getElementById('status-banner');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideStatus() {
    document.getElementById('status-banner').classList.remove('show');
  }

  function clearMapMarkers() {
    if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
    if (answerMarker) { map.removeLayer(answerMarker); answerMarker = null; }
    if (answerLine) { map.removeLayer(answerLine); answerLine = null; }
  }

  function resetProvinceLayerStyles() {
    Object.values(provinceLayers).forEach(layer => layer.setStyle(PROVINCE_DEFAULT_STYLE));
  }

  // ---- Data loading ----
  async function loadPlaces() {
    try {
      const res = await fetch(`${API_BASE}/places`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allPlaces = await res.json();
      hideStatus();
    } catch (e) {
      showStatus(
              `Could not reach the backend at ${API_BASE}. Make sure it's running ` +
              `(./gradlew run in the backend folder), then reload this page.`
      );
      console.error(e);
    }
  }

  // ---- Mode switching ----
  document.getElementById('mode-click').addEventListener('click', () => setMode('click'));
  document.getElementById('mode-name').addEventListener('click', () => setMode('name'));
  document.getElementById('mode-province').addEventListener('click', () => setMode('province'));

  function setMode(newMode) {
    mode = newMode;
    document.getElementById('mode-click').classList.toggle('active', mode === 'click');
    document.getElementById('mode-name').classList.toggle('active', mode === 'name');
    document.getElementById('mode-province').classList.toggle('active', mode === 'province');
    document.getElementById('name-input-row').style.display = mode === 'name' ? 'flex' : 'none';

    // Province mode replaces the side-panel prompt entirely (the place name follows
    // the cursor on the map instead), and uses its own stats card.
    document.getElementById('prompt-card').style.display = mode === 'province' ? 'none' : 'block';
    document.getElementById('stats-card').style.display = mode === 'province' ? 'none' : 'block';
    document.getElementById('province-stats-card').style.display = mode === 'province' ? 'block' : 'none';
    document.getElementById('cursor-label').style.display = 'none'; // reset; shown on mousemove in province mode

    if (mode === 'click') {
      document.getElementById('hint-text').textContent = 'Click anywhere on the map where you think this place is.';
      document.getElementById('prompt-eyebrow').textContent = 'Find this place';
    } else if (mode === 'name') {
      document.getElementById('hint-text').textContent = 'A marker is shown on the map. Type the name of that place.';
      document.getElementById('prompt-eyebrow').textContent = 'What place is this?';
    }

    nextRound();
  }

  // ---- Round flow ----
  async function nextRound() {
    clearMapMarkers();
    document.getElementById('feedback').classList.remove('show', 'correct', 'close', 'wrong');
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('name-input').value = '';
    document.getElementById('name-input').disabled = false;
    document.getElementById('submit-name').disabled = false;
    roundActive = true;

    if (mode === 'click') {
      if (allPlaces.length === 0) { await loadPlaces(); }
      if (allPlaces.length === 0) return;
      currentPlace = allPlaces[Math.floor(Math.random() * allPlaces.length)];
      document.getElementById('prompt-name').textContent = currentPlace.name;
      // Province intentionally hidden here — showing it would hint at where to click.
      document.getElementById('prompt-province').textContent = '';
    } else if (mode === 'name') {
      try {
        const res = await fetch(`${API_BASE}/round/name-target`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        currentTarget = await res.json();
        hideStatus();
        document.getElementById('prompt-name').textContent = '?';
        document.getElementById('prompt-province').textContent = currentTarget.province || '';
        const marker = L.circleMarker([currentTarget.lat, currentTarget.lng], {
          radius: 9, color: '#2B3A4A', weight: 2, fillColor: '#C1572D', fillOpacity: 0.9
        }).addTo(map);
        answerMarker = marker;
        map.setView([currentTarget.lat, currentTarget.lng], 8);
        document.getElementById('name-input').focus();
      } catch (e) {
        showStatus(`Could not reach the backend at ${API_BASE}. Make sure it's running, then try again.`);
        console.error(e);
      }
    } else if (mode === 'province') {
      await nextProvinceRound();
    }
  }

  // ---- Province mode: round flow ----
  async function nextProvinceRound() {
    isProcessingGuess = false;
    roundActive = true;

    resetProvinceLayerStyles();
    provinceWrongTries = 0;
    provinceWrongNames = new Set();
    provinceRevealed = false;
    provinceRevealedCorrectName = null;
    document.getElementById('province-feedback').classList.remove('show', 'correct', 'wrong', 'reveal');
    document.getElementById('province-next-btn').style.display = 'none';

    try {
      const res = await fetch(`${API_BASE}/round/province-target`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      currentProvinceTarget = await res.json();
      hideStatus();
      // Refresh the cursor label right away — without this, it keeps showing the
      // previous round's name until the mouse next moves, which feels glitchy.
      updateCursorLabel();
    } catch (e) {
      showStatus(`Could not reach the backend at ${API_BASE}. Make sure it's running, then try again.`);
      console.error(e);
    }
  }

  // ---- Click mode: handle map click ----
  map.on('click', async (e) => {
    if (mode !== 'click' || !roundActive || !currentPlace) return;
    roundActive = false;

    const { lat, lng } = e.latlng;
    if (guessMarker) map.removeLayer(guessMarker);
    guessMarker = L.circleMarker([lat, lng], {
      radius: 7, color: '#2B3A4A', weight: 2, fillColor: '#C1572D', fillOpacity: 0.85
    }).addTo(map);

    try {
      const res = await fetch(`${API_BASE}/guess/click`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ placeId: currentPlace.id, guessLat: lat, guessLng: lng })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const result = await res.json();

      answerMarker = L.circleMarker([result.correctLat, result.correctLng], {
        radius: 7, color: '#2B3A4A', weight: 2, fillColor: '#F3EEE2', fillOpacity: 0.95
      }).addTo(map);
      answerLine = L.polyline(
              [[lat, lng], [result.correctLat, result.correctLng]],
              { color: '#2B3A4A', weight: 1.5, dashArray: '4 5', opacity: 0.6 }
      ).addTo(map);

      showFeedback(result.score, result.distanceKm, result.correctName, result.clickedProvince);
      sessionRounds++;
      sessionScore += result.score;
      updateStats();
      document.getElementById('next-btn').style.display = 'inline-block';
    } catch (err) {
      showStatus(`Could not reach the backend at ${API_BASE}. Make sure it's running, then try again.`);
      console.error(err);
      roundActive = true;
    }
  });

  function showFeedback(score, distanceKm, correctName, clickedProvince) {
    const el = document.getElementById('feedback');
    el.classList.remove('correct', 'close', 'wrong');
    let cls = score >= 4000 ? 'correct' : score >= 1500 ? 'close' : 'wrong';
    el.classList.add(cls, 'show');
    const provinceLine = clickedProvince
            ? `You clicked in <strong>${clickedProvince}</strong>.`
            : `Your click landed outside the Netherlands (e.g. over water).`;
    el.innerHTML = `
      <div class="score-row">
        <span class="big">${score}</span>
        <span class="label">points</span>
      </div>
      <div>${correctName} was ${distanceKm} km from your click.</div>
      <div style="margin-top:4px">${provinceLine}</div>
    `;
  }

  async function handleProvinceClick(clickedProvinceName) {
    // 1. Guard: Prevent overlapping clicks during an active network request
    if (!roundActive) return;
    if (isProcessingGuess) return;

    // 2. Guard: Ensure there is a target province to guess
    if (!currentProvinceTarget) return;

    // 3. Logic: If answer is already revealed, only clicking the correct province advances the round
    if (provinceRevealed) {
      if (clickedProvinceName === provinceRevealedCorrectName) {
        nextProvinceRound();
      }
      return;
    }

    // 4. Guard: Ignore re-clicks on a province already marked wrong this round
    if (provinceWrongNames.has(clickedProvinceName)) return;

    // 5. Set the lock before starting the async operation
    isProcessingGuess = true;

    try {
      const res = await fetch(`${API_BASE}/guess/province`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          placeId: currentProvinceTarget.placeId,
          guessedProvince: clickedProvinceName
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const result = await res.json();
      hideStatus();

      if (result.isCorrect) {
        provinceStatRounds++;
        provinceStatCorrect++;
        if (provinceWrongTries === 0) provinceStatFirstTry++;
        updateProvinceStats();

        const layer = provinceLayers[clickedProvinceName];
        if (layer) layer.setStyle(PROVINCE_CORRECT_STYLE);

        showProvinceFeedback('correct', `Correct — that's ${result.correctProvince}.`);

        // Auto-advance
        roundActive = false;

        isProcessingGuess = false;
        setTimeout(() => { nextProvinceRound(); }, 700);
        return;
      } else {
        provinceWrongTries++;
        provinceWrongNames.add(clickedProvinceName);
        const layer = provinceLayers[clickedProvinceName];
        if (layer) layer.setStyle(PROVINCE_WRONG_STYLE);

        if (provinceWrongTries >= 3) {
          provinceRevealed = true;
          provinceRevealedCorrectName = result.correctProvince;
          provinceStatRounds++;
          updateProvinceStats();

          const correctLayer = provinceLayers[result.correctProvince];
          if (correctLayer) correctLayer.setStyle(PROVINCE_REVEAL_STYLE);

          showProvinceFeedback('reveal', `The answer was ${result.correctProvince}. Click it on the map to continue.`);
          document.getElementById('province-next-btn').style.display = 'inline-block';
        } else {
          showProvinceFeedback('wrong', `Not quite — try again.`);
        }
      }
    } catch (err) {
      showStatus(`Could not reach the backend at ${API_BASE}. Make sure it's running, then try again.`);
      console.error(err);
    } finally {
      // 6. Release the lock so the user can click again
      isProcessingGuess = false;
    }
  }

  function showProvinceFeedback(cls, message) {
    const el = document.getElementById('province-feedback');
    el.classList.remove('correct', 'wrong', 'reveal');
    el.classList.add(cls, 'show');
    el.textContent = message;
  }

  function updateProvinceStats() {
    document.getElementById('province-stat-rounds').textContent = provinceStatRounds;
    document.getElementById('province-stat-correct').textContent = provinceStatCorrect;
    document.getElementById('province-stat-firsttry').textContent = provinceStatFirstTry;
  }

  document.getElementById('province-next-btn').addEventListener('click', nextProvinceRound);

  // ---- Province mode: cursor-following name label (Seterra-style) ----
  const cursorLabel = document.getElementById('cursor-label');
  const mapCard = document.querySelector('.map-card');
  let lastMouseClientX = null;
  let lastMouseClientY = null;

  function updateCursorLabel() {
    if (mode !== 'province' || !currentProvinceTarget || lastMouseClientX === null) {
      cursorLabel.style.display = 'none';
      return;
    }
    const cardRect = mapCard.getBoundingClientRect();
    const x = lastMouseClientX - cardRect.left;
    const y = lastMouseClientY - cardRect.top;
    // If the cursor isn't currently over the map card (e.g. it's still sitting where
    // it was before the round changed, but that happened to be outside the map),
    // don't show a label floating outside the map area.
    if (x < 0 || y < 0 || x > cardRect.width || y > cardRect.height) {
      cursorLabel.style.display = 'none';
      return;
    }
    cursorLabel.style.left = `${x}px`;
    cursorLabel.style.top = `${y}px`;
    cursorLabel.textContent = currentProvinceTarget.name;
    cursorLabel.style.display = 'block';
  }

  map.getContainer().addEventListener('mousemove', (e) => {
    lastMouseClientX = e.clientX;
    lastMouseClientY = e.clientY;
    updateCursorLabel();
  });

  map.getContainer().addEventListener('mouseleave', () => {
    lastMouseClientX = null;
    lastMouseClientY = null;
    cursorLabel.style.display = 'none';
  });

  // ---- Name mode: handle submit ----
  document.getElementById('submit-name').addEventListener('click', submitNameGuess);
  document.getElementById('name-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitNameGuess();
  });

  async function submitNameGuess() {
    if (mode !== 'name' || !roundActive || !currentTarget) return;
    const guess = document.getElementById('name-input').value.trim();
    if (!guess) return;
    roundActive = false;
    document.getElementById('name-input').disabled = true;
    document.getElementById('submit-name').disabled = true;

    try {
      const res = await fetch(`${API_BASE}/guess/name`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ placeId: currentTarget.placeId, guessName: guess })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const result = await res.json();

      document.getElementById('prompt-name').textContent = result.correctName;

      const el = document.getElementById('feedback');
      el.classList.remove('correct', 'close', 'wrong');
      let score, cls, message;
      if (result.isCorrect) {
        score = 1000; cls = 'correct'; message = 'Correct!';
      } else if (result.isClose) {
        score = 500; cls = 'close'; message = `Close — you wrote "${guess}", the answer was "${result.correctName}".`;
      } else {
        score = 0; cls = 'wrong'; message = `Not quite — the answer was "${result.correctName}".`;
      }
      el.classList.add(cls, 'show');
      el.innerHTML = `
        <div class="score-row">
          <span class="big">${score}</span>
          <span class="label">points</span>
        </div>
        <div>${message}</div>
      `;

      sessionRounds++;
      sessionScore += score;
      updateStats();
      document.getElementById('next-btn').style.display = 'inline-block';
    } catch (err) {
      showStatus(`Could not reach the backend at ${API_BASE}. Make sure it's running, then try again.`);
      console.error(err);
      roundActive = true;
      document.getElementById('name-input').disabled = false;
      document.getElementById('submit-name').disabled = false;
    }
  }

  function updateStats() {
    document.getElementById('stat-rounds').textContent = sessionRounds;
    document.getElementById('stat-score').textContent = sessionScore;
    document.getElementById('stat-avg').textContent = sessionRounds > 0
            ? Math.round(sessionScore / sessionRounds)
            : '—';
  }

  document.getElementById('next-btn').addEventListener('click', nextRound);

  // ---- Boot ----
  (async function init() {
    await loadPlaces();
    await nextRound();
  })();
</script>
</body>
</html>
